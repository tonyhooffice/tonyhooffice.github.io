<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-gray-50 text-gray-800 font-sans">

    <div id="loading-overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-white">
        <div id="status" class="text-blue-600 font-semibold text-xl">Loading Workspace...</div>
    </div>

    <!-- Header -->
    <header id="main-header" class="sticky top-0 z-40 bg-gray-50 px-6 py-0">
        <!-- Removed hard-coded pr-[17px], will be managed by JS -->
        <div class="grid grid-cols-3 gap-0 w-full" id="header-grid">
            <div id="header-col-1" class="bg-white border border-gray-200 rounded-l-lg py-2 px-4 text-sm font-bold"></div>
            <div id="header-col-2" class="bg-white border-t border-b border-gray-200 py-2 px-4 text-sm font-bold"></div>
            <div id="header-col-3" class="bg-white border border-gray-200 rounded-r-lg py-2 px-4 text-sm font-bold"></div>
        </div>
    </header>

    <div id="panel-bar" class="bg-gray-50 border-b px-6 py-1 flex justify-between items-center z-30">
        <div class="flex items-center gap-6">
            <div id="col-tabs" class="flex gap-2">
                <button id="tab-1" class="px-3 py-0.5 bg-white border shadow-sm rounded font-medium !text-[12px]">Col 1</button>
                <button id="tab-2" class="px-3 py-0.5 bg-white border shadow-sm rounded font-medium !text-[12px]">Col 2</button>
                <button id="tab-3" class="px-3 py-0.5 bg-white border shadow-sm rounded font-medium !text-[12px]">Col 3</button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <main id="main-content" class="flex-1 overflow-auto px-6 bg-gray-50">
        <div class="grid grid-cols-3 gap-0 border-l border-r border-b border-gray-200 rounded-b-lg bg-white" id="content-grid">
        </div>
    </main>

    <script>
        const CONFIG = {
            masterRegistry: "https://docs.google.com/spreadsheets/d/1tp8aCnchL3QIJiZMKAduJJvehSNG2vIJ2Jfnx7qcs-Q/export?format=csv",
            conditionString: "text00010001"
        };

        // Scrollbar detection logic
        function updateHeaderPadding() {
            const container = document.getElementById('main-content');
            const header = document.getElementById('header-grid');
            const hasScrollbar = container.scrollHeight > container.clientHeight;
            
            // Calculate scrollbar width
            const scrollbarWidth = container.offsetWidth - container.clientWidth;
            
            if (hasScrollbar && scrollbarWidth > 0) {
                header.style.paddingRight = scrollbarWidth + 'px';
            } else {
                header.style.paddingRight = '0px';
            }
        }

        async function fetchWithBackoff(url, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= retries; i++) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error();
                    return await response.text();
                } catch (e) { if (i === retries) throw e; await new Promise(r => setTimeout(r, delays[i])); }
            }
        }

        async function initializeData() {
            try {
                const registryRaw = await fetchWithBackoff(CONFIG.masterRegistry);
                const registryData = registryRaw.split('\n').map(r => r.split(','));
                const match = registryData.find(r => r[2]?.trim() === CONFIG.conditionString);
                
                const wsRaw = await fetchWithBackoff(match[3].trim().replace(/\/edit.*$/, '/export?format=csv'));
                const data = wsRaw.split('\n').map(r => r.split(','));

                document.getElementById('loading-overlay').style.display = 'none';
                ['header-col-1', 'header-col-2', 'header-col-3'].forEach((id, i) => document.getElementById(id).innerText = data[1][i] || '');

                const grid = document.getElementById('content-grid');
                for (let i = 8; i < data.length; i++) {
                    for(let j=0; j<3; j++) {
                        const cell = document.createElement('div');
                        cell.className = `py-4 px-4 text-sm border-b border-gray-200 ${j < 2 ? 'border-r' : ''}`;
                        cell.innerText = data[i][j] || "";
                        grid.appendChild(cell);
                    }
                }
                
                // Set observer to detect changes and adjust alignment
                const observer = new ResizeObserver(updateHeaderPadding);
                observer.observe(document.getElementById('main-content'));
                updateHeaderPadding();
            } catch (error) {
                document.getElementById('status').innerText = `Error: Data could not be loaded.`;
            }
        }
        initializeData();
    </script>
</body>
</html>
