<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Star Book Icon</title>
  <style>
    /* =================================================================
      GLOBAL VARIABLE DEFINITIONS (The "Control Panel")
      =================================================================
    */
    :root {
      /* Overall Canvas Layout */
      --starBook-width: 250px;       /* Slightly larger for better canvas viewing */
      --starBook-height: 250px;
      --starBook-margin: 50px auto;
      --starBook-shadow: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.15));

      /* Animation Specs */
      --hover-transition-book: fill 0.3s ease;
      --hover-transition-star: transform 0.4s ease, fill 0.3s ease;
      --star-rotation: none;        /* STAR REPOSITIONING FREEZE ACTIVATED */

      /* Book Component Styles */
      --book-color-base: #2c3e50;
      --book-color-hover: #34495e;
      --book-opacity: 0.95;

      /* Star Component Styles */
      --star-color-base: #FFD700;
      --star-color-hover: #ffffff;
      --star-stroke-color-base: #FFD700;
      --star-stroke-color-hover: #f1c40f;
      --star-stroke-width: 0.4px;
      
      /* Star Pivot Point (Center coordinates inside Book viewBox) */
      --star-pivot-point: 210px 220px; 
    }

    /* Page Container styling for high visual appeal */
    body {
      background-color: #f7f9fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 30px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 25px;
    }

    /* =================================================================
      CSS STYLES USING THE VARIABLES ONLY
      =================================================================
    */

    /* 1. Base style for the entire starBookSVG graphic */
    .starBookSVG {
      width: var(--starBook-width);
      height: var(--starBook-height);
      display: block;
      margin: var(--starBook-margin);
      filter: var(--starBook-shadow);
      cursor: pointer; /* Changes mouse cursor to a hand pointing icon on desktop */
      -webkit-tap-highlight-color: transparent; /* Removes the default blue flash overlay on mobile tap */
      transition: transform 0.1s ease;
    }

    /* Subtle press-down scale feedback (works on both mouse click & mobile tap) */
    .starBookSVG:active {
      transform: scale(0.96);
    }

    /* 2. Styling the BOOK component */
    .bookSVG {
      fill: var(--book-color-base);
      opacity: var(--book-opacity);
      transition: var(--hover-transition-book);
    }

    /* 3. Styling the STAR component */
    .starSVG {
      fill: var(--star-color-base);
      stroke: var(--star-stroke-color-base);
      stroke-width: var(--star-stroke-width);
      transition: var(--hover-transition-star);
      transform-origin: var(--star-pivot-point);
    }

    /* =================================================================
      DESKTOP-ONLY HOVER INTERACTIVITY
      This media query screens out touchscreens, targeting only devices with hover!
      =================================================================
    */
    @media (hover: hover) {
      /* When hovering with a mouse pointer, change the book color */
      .starBookSVG:hover .bookSVG {
        fill: var(--book-color-hover);
      }

      /* When hovering with a mouse pointer, change the star colors */
      .starBookSVG:hover .starSVG {
        fill: var(--star-color-hover);
        stroke: var(--star-stroke-color-hover);
        transform: var(--star-rotation); /* Stays 'none' to keep it static */
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Smart Interactive Icon</h1>
    <p><strong>Desktop (Mouse):</strong> Hover to see smooth color changes. Click to press down.</p>
    <p><strong>Mobile (Touch):</strong> Tapping will scale the icon down dynamically (tactile feedback) but won't trigger any sticky hover colors.</p>
