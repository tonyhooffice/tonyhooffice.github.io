<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-gray-50 text-gray-800 font-sans">

    <div id="loading-overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-white">
        <div id="status" class="text-blue-600 font-semibold text-xl">Loading Workspace...</div>
    </div>

    <!-- Header: Added pr-[17px] to compensate for the content scrollbar -->
    <header id="main-header" class="sticky top-0 z-40 bg-gray-50 px-6 py-0">
        <div class="grid grid-cols-3 gap-0 w-full pr-[17px]" id="header-grid">
            <div id="header-col-1" class="bg-white border border-gray-200 rounded-l-lg py-2 px-4 text-sm font-bold"></div>
            <div id="header-col-2" class="bg-white border-t border-b border-gray-200 py-2 px-4 text-sm font-bold"></div>
            <div id="header-col-3" class="bg-white border border-gray-200 rounded-r-lg py-2 px-4 text-sm font-bold"></div>
        </div>
    </header>

    <div id="panel-bar" class="bg-gray-50 border-b px-6 py-1 flex justify-between items-center z-30">
        <div class="flex items-center gap-6">
            <div id="col-tabs" class="flex gap-2">
                <button id="tab-1" class="px-3 py-0.5 bg-white border shadow-sm rounded font-medium !text-[12px]">Col 1</button>
                <button id="tab-2" class="px-3 py-0.5 bg-white border shadow-sm rounded font-medium !text-[12px]">Col 2</button>
                <button id="tab-3" class="px-3 py-0.5 bg-white border shadow-sm rounded font-medium !text-[12px]">Col 3</button>
            </div>
        </div>
    </div>

    <!-- Content: Standardized 3-column Grid -->
    <main class="flex-1 overflow-auto px-6 bg-gray-50">
        <div class="grid grid-cols-3 gap-0 border-l border-r border-b border-gray-200 rounded-b-lg bg-white" id="content-grid">
            <!-- Rows injected here -->
        </div>
    </main>

    <script>
        const CONFIG = {
            masterRegistry: "https://docs.google.com/spreadsheets/d/1tp8aCnchL3QIJiZMKAduJJvehSNG2vIJ2Jfnx7qcs-Q/export?format=csv",
            conditionString: "text00010001"
        };

        function parseCSV(text) {
            const result = []; let row = [], col = "", inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (inQuotes) {
                    if (char === '"') { if (text[i + 1] === '"') { col += '"'; i++; } else inQuotes = false; }
                    else { col += char; }
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === ',') { row.push(col); col = ""; }
                    else if (char === '\n' || char === '\r') {
                        if (char === '\r' && text[i + 1] === '\n') i++;
                        row.push(col); result.push(row); row = []; col = "";
                    } else { col += char; }
                }
            }
            if (col || row.length) { row.push(col); result.push(row); }
            return result;
        }

        async function fetchWithBackoff(url, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= retries; i++) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.text();
                } catch (error) {
                    if (i === retries) throw new Error(`Failed after ${retries} retries: ${error.message}`);
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function initializeData() {
            try {
                const registryRaw = await fetchWithBackoff(CONFIG.masterRegistry);
                const registryData = parseCSV(registryRaw);
                const matchedRow = registryData.find(row => row[2] && row[2].trim() === CONFIG.conditionString);
                
                if (!matchedRow || !matchedRow[3]) throw new Error(`Condition string "${CONFIG.conditionString}" not found.`);

                let workspaceUrl = matchedRow[3].trim().replace(/\/edit.*$/, '/export?format=csv');
                const workspaceRaw = await fetchWithBackoff(workspaceUrl);
                const workspaceData = parseCSV(workspaceRaw);

                document.getElementById('loading-overlay').style.display = 'none';
                document.title = workspaceData[0][1] || 'Dashboard';

                document.getElementById('header-col-1').innerText = workspaceData[1][0] || '';
                document.getElementById('header-col-2').innerText = workspaceData[1][1] || '';
                document.getElementById('header-col-3').innerText = workspaceData[1][2] || '';

                const grid = document.getElementById('content-grid');
                for (let i = 8; i < workspaceData.length; i++) {
                    const row = workspaceData[i];
                    for (let idx = 0; idx < 3; idx++) {
                        const cell = document.createElement('div');
                        cell.className = "py-4 px-4 text-sm border-b border-gray-200" + (idx < 2 ? " border-r" : "");
                        cell.innerText = row[idx] || "";
                        grid.appendChild(cell);
                    }
                }
            } catch (error) {
                document.getElementById('status').innerText = `Error: ${error.message}`;
            }
        }
        initializeData();
    </script>
</body>
</html>
